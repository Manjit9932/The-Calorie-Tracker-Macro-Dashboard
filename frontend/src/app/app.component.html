<div class="app-container">
  <app-notification-modal></app-notification-modal>
  
  <header class="app-header">
    <h1>{{ title }}</h1>
    <p class="subtitle">Track your daily nutrition with precision</p>
  </header>

  <main class="app-main">
    <!-- Login/Register Section -->
    <div *ngIf="!isLoggedIn" class="auth-section">
      <div class="auth-container">
        <!-- Register Form -->
        <div *ngIf="showLoginForm === false" class="form-box">
          <h2>Create Account</h2>
          <div class="form-group">
            <label>Username:</label>
            <input type="text" [(ngModel)]="username" placeholder="Enter username" class="form-input">
          </div>
          <div class="form-group">
            <label>Email:</label>
            <input type="email" [(ngModel)]="email" placeholder="Enter email" class="form-input">
          </div>
          <div class="form-group">
            <label>Password:</label>
            <input type="password" [(ngModel)]="password" placeholder="Enter password" class="form-input">
          </div>
          <button (click)="registerUser()" class="btn btn-primary">Register</button>
          <p class="toggle-text">Already have an account? <a (click)="toggleLoginRegister()">Login</a></p>
        </div>

        <!-- Login Form -->
        <div *ngIf="showLoginForm" class="form-box">
          <h2>Login</h2>
          <div class="form-group">
            <label>Username:</label>
            <input type="text" [(ngModel)]="loginUsername" placeholder="Enter username" class="form-input">
          </div>
          <div class="form-group">
            <label>Password:</label>
            <input type="password" [(ngModel)]="loginPassword" placeholder="Enter password" class="form-input">
          </div>
          <button (click)="loginUser()" class="btn btn-primary">Login</button>
          <p class="toggle-text">Don't have an account? <a (click)="toggleLoginRegister()">Register</a></p>
        </div>
      </div>
    </div>

    <!-- Dashboard Section -->
    <div *ngIf="isLoggedIn" class="dashboard-section">
      <div class="logout-container">
        <button (click)="logout()" class="btn btn-danger">Logout</button>
      </div>
      <app-dashboard [userId]="currentUserId"></app-dashboard>
    </div>
  </main>

  <footer class="app-footer">
    <p>&copy; 2024 Calorie Tracker. All rights reserved.</p>
  </footer>
</div>
